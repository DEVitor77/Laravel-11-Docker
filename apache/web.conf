<VirtualHost *:80> # <-- Mudei de 8080 para 80
    ServerName localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public> # <-- Mudei de /var/www/html para /var/www/html/public
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # REMOVIDO: O bloco <FilesMatch \.php$> com SetHandler para PHP-FPM

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>